---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  chart:
    spec:
      chart: cert-manager
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: cert-manager
        namespace: cert-manager
      version: 1.15.x
  install:
    crds: Create
    createNamespace: true
  interval: 10m0s
  releaseName: cert-manager
  upgrade:
    crds: CreateReplace
  values:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 100Mi
    # disable prometheus until we have prometheus setup
    prometheus:
      enabled: false
