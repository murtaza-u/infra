---
name: Kubernetes CI tests

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - "hosts/**"
  push:
    branches:
      - "*"
    paths-ignore:
      - "hosts/**"

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install nix
        uses: cachix/install-nix-action@v27

      - name: Lint YAML
        run: "nix develop --command yamllint ."
